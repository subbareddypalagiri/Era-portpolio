<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SubbaReddy Pallagiri — Portfolio</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap');

*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100vw;height:100vh;overflow:hidden;background:#000;color:#fff;font-family:"Space Grotesk",sans-serif;}

#video-wrap{position:fixed;inset:0;z-index:0;}
#vid{width:100%;height:100%;object-fit:cover;}
#vignette{position:fixed;inset:0;z-index:1;background:radial-gradient(ellipse at center,transparent 25%,rgba(0,0,0,0.62) 100%);pointer-events:none;}
#sc{position:fixed;inset:0;pointer-events:none;z-index:2;}
#fx{position:fixed;inset:0;pointer-events:none;z-index:200;}

#top-nav{
  position:fixed;top:28px;left:50%;transform:translateX(-50%);z-index:100;
  display:flex;gap:18px;background:rgba(0,0,0,0.38);padding:11px 26px;
  border-radius:999px;backdrop-filter:blur(14px);border:1px solid rgba(255,255,255,0.09);
  align-items:center;
}
.nav-dot{width:8px;height:8px;background:rgba(255,255,255,0.22);border-radius:50%;cursor:pointer;transition:all .3s;position:relative;}
.nav-dot:hover,.nav-dot.active{background:#a78bfa;transform:scale(1.5);box-shadow:0 0 10px #a78bfa;}
.nav-dot::after{content:attr(data-label);position:absolute;top:20px;left:50%;transform:translateX(-50%);font-size:10px;font-family:"Space Mono",monospace;opacity:0;transition:.3s;white-space:nowrap;color:#fff;}
.nav-dot:hover::after{opacity:1;}

#cosmic-quotes{
  position:fixed;bottom:85px;left:50%;transform:translateX(-50%);z-index:15;
  font-family:"Space Mono",monospace;font-size:12px;color:rgba(167,139,250,0.8);
  letter-spacing:1px;text-align:center;pointer-events:none;
  background:rgba(0,0,0,0.4);padding:8px 18px;border-radius:999px;
  border:1px solid rgba(167,139,250,0.2);backdrop-filter:blur(10px);
  transition:opacity 0.5s ease;
}

#labels{position:fixed;inset:0;z-index:10;pointer-events:none;}
.lbl{position:absolute;pointer-events:none;opacity:0;display:flex;flex-direction:column;align-items:center;gap:6px;transition:opacity .6s ease;cursor:pointer;}
.lbl.visible{opacity:1;pointer-events:all;}
.lbl:hover .pill{background:rgba(167,139,250,0.22);border-color:rgba(167,139,250,0.8);transform:scale(1.07);}
.dot-ring{width:10px;height:10px;border-radius:50%;background:rgba(167,139,250,.95);box-shadow:0 0 0 4px rgba(167,139,250,.2),0 0 14px rgba(167,139,250,.9);animation:ping 2.5s ease-in-out infinite;}
@keyframes ping{0%,100%{box-shadow:0 0 0 4px rgba(167,139,250,.2),0 0 14px rgba(167,139,250,.8);}50%{box-shadow:0 0 0 9px rgba(167,139,250,.06),0 0 28px rgba(167,139,250,.35);}}
.pill{background:rgba(0,0,0,.55);border:1px solid rgba(167,139,250,.4);border-radius:999px;padding:7px 18px;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;font-family:"Space Mono",monospace;color:rgba(255,255,255,.9);backdrop-filter:blur(14px);transition:all .25s;white-space:nowrap;}

#overlay{position:fixed;inset:0;z-index:50;background:rgba(0,0,0,0);pointer-events:none;transition:background .35s;}
#overlay.open{background:rgba(0,0,0,.4);pointer-events:all;backdrop-filter:blur(4px);}

.card{
  position:fixed;right:4%;top:50%;transform:translateY(-50%) translateX(120%) scale(0.9);
  width:90%;max-width:460px;max-height:85vh;
  border-radius:22px;padding:2px;
  background:linear-gradient(135deg, rgba(56,189,248,0.6), rgba(167,139,250,0.6), rgba(240,171,252,0.6), rgba(56,189,248,0.6));
  background-size:300% 300%; animation:auroraAnim 6s ease infinite;
  opacity:0;transition:all .5s cubic-bezier(.22,1,.36,1); display:none;z-index:60;
}
.card.show{opacity:1;transform:translateY(-50%) translateX(0) scale(1);}
.card.exploding{pointer-events:none; opacity:0; transform:translateY(-50%) scale(0.8); transition:all 0.2s;}
@keyframes auroraAnim{0%{background-position:0% 50%;}50%{background-position:100% 50%;}100%{background-position:0% 50%;}}

.card-inner{
  background:rgba(5,8,20,0.92);border-radius:20px;padding:34px 40px;
  backdrop-filter:blur(20px);height:100%;overflow-y:auto; position:relative;
  scrollbar-width:thin;scrollbar-color:rgba(167,139,250,.3) transparent;
}
.card-inner::-webkit-scrollbar{width:4px;} .card-inner::-webkit-scrollbar-thumb{background:rgba(167,139,250,.3);border-radius:4px;}
.close-btn{position:absolute;top:16px;right:20px;cursor:pointer;color:rgba(255,255,255,.38);font-size:18px;transition:color .2s;line-height:1;background:none;border:none;}
.close-btn:hover{color:#fff;}

.card-name{font-size:clamp(28px,4vw,42px);font-weight:700;background:linear-gradient(135deg,#fff 0%,#a78bfa 55%,#818cf8 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1.1;margin-bottom:5px;}
.card-role{font-family:"Space Mono",monospace;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:#a78bfa;margin-bottom:14px;}
.card-bio{font-size:13px;color:rgba(255,255,255,.6);line-height:1.7;margin-bottom:16px;}
.card h2{font-size:20px;font-weight:700;background:linear-gradient(135deg,#fff,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:16px;}
.divider{height:1px;background:linear-gradient(90deg,transparent,rgba(167,139,250,.28),transparent);margin:16px 0;}
.info-row{display:flex;flex-wrap:wrap;gap:18px;margin-top:12px;}
.info-item{display:flex;flex-direction:column;gap:3px;}
.info-label{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:rgba(167,139,250,.6);font-family:"Space Mono",monospace;}
.info-val{font-size:12px;color:rgba(255,255,255,.85);}
.tags{display:flex;flex-wrap:wrap;gap:7px;margin-top:8px;}
.tag{background:rgba(167,139,250,.1);border:1px solid rgba(167,139,250,.28);color:rgba(255,255,255,.85);padding:5px 12px;border-radius:999px;font-size:10px;font-family:"Space Mono",monospace;letter-spacing:.4px;}
.tag-group{margin-bottom:14px;}
.tag-group-label{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:rgba(167,139,250,.65);font-family:"Space Mono",monospace;margin-bottom:7px;}
.proj-item{background:rgba(255,255,255,.025);border:1px solid rgba(255,255,255,.07);border-radius:13px;padding:14px 18px;margin-bottom:11px;transition:border-color .25s;}
.proj-item:hover{border-color:rgba(167,139,250,.35);}
.proj-title{font-size:14px;font-weight:600;color:#fff;margin-bottom:5px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.proj-badge{font-size:9px;font-family:"Space Mono",monospace;letter-spacing:1px;text-transform:uppercase;background:rgba(167,139,250,.12);border:1px solid rgba(167,139,250,.3);color:#a78bfa;padding:2px 8px;border-radius:999px;}
.proj-desc{font-size:11.5px;color:rgba(255,255,255,.5);line-height:1.6;}
.cbtns{display:flex;gap:10px;margin-top:18px;flex-wrap:wrap;}
.cb{padding:10px 16px;border:1px solid rgba(255,255,255,.13);border-radius:11px;color:#fff;text-decoration:none;font-size:11px;font-family:"Space Mono",monospace;background:rgba(255,255,255,.04);transition:all .22s;letter-spacing:.4px;display:inline-flex;align-items:center;justify-content:center;}
.cb:hover{background:rgba(167,139,250,.18);border-color:rgba(167,139,250,.5);}
.cb.primary{background:rgba(167,139,250,.18);border-color:rgba(167,139,250,.42);}
.cb.primary:hover{background:rgba(167,139,250,.3);}

.char{display:inline-block;opacity:0;transform:translateY(-70px) scale(0.7);transition:transform .55s cubic-bezier(.22,1,.36,1), opacity .4s ease;will-change:transform,opacity;}
.char.down{opacity:1;transform:translateY(0) scale(1);}
#hint{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:20;color:rgba(255,255,255,.22);font-size:11px;text-transform:uppercase;letter-spacing:3px;font-family:"Space Mono",monospace;transition:opacity .8s;pointer-events:none;text-align:center;line-height:2;}

#admin-btn{position:fixed;bottom:28px;right:28px;z-index:200;background:rgba(0,0,0,0.5);border:1px solid rgba(167,139,250,0.3);border-radius:999px;padding:9px 20px;font-size:12px;font-family:'Space Mono',monospace;color:rgba(255,255,255,0.7);cursor:pointer;transition:all .3s;backdrop-filter:blur(10px);}
#admin-btn:hover{color:#fff;border-color:rgba(167,139,250,0.8);background:rgba(167,139,250,0.2);}

#admin-panel{position:fixed;inset:0;z-index:300;background:rgba(0,0,0,0.85);backdrop-filter:blur(20px);display:none;align-items:center;justify-content:center;}
#admin-panel.open{display:flex;}
.admin-box{background:rgba(5,8,20,0.95);border:1px solid rgba(167,139,250,0.4);border-radius:24px;padding:30px 40px;max-width:540px;width:92%;max-height:90vh;overflow-y:auto;}
.admin-box::-webkit-scrollbar{width:4px;} .admin-box::-webkit-scrollbar-thumb{background:rgba(167,139,250,.3);border-radius:4px;}
.admin-box h3{font-size:22px;font-weight:600;margin-bottom:6px;background:linear-gradient(90deg,#fff,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.admin-box p{font-size:12px;color:rgba(255,255,255,0.45);margin-bottom:20px;}
.admin-input{width:100%;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:10px;padding:10px 14px;color:#fff;font-size:13px;font-family:'Space Grotesk',sans-serif;margin-bottom:10px;outline:none;}
.admin-input:focus{border-color:rgba(167,139,250,0.6);}
textarea.admin-input{resize:vertical;min-height:70px;}
select.admin-input{cursor:pointer;appearance:none;background:rgba(167,139,250,0.1);border-color:rgba(167,139,250,0.4);font-weight:600;}
.admin-save{width:100%;padding:11px;border-radius:10px;border:none;background:rgba(167,139,250,0.3);border:1px solid rgba(167,139,250,0.6);color:#fff;font-size:13px;font-weight:600;cursor:pointer;transition:all .3s;margin-top:4px;}
.admin-save:hover{background:rgba(167,139,250,0.5);}
.admin-close{margin-top:10px;width:100%;padding:9px;border-radius:10px;border:1px solid rgba(255,255,255,0.1);background:transparent;color:rgba(255,255,255,0.4);cursor:pointer;font-size:12px;}
.admin-close:hover{color:#fff;border-color:rgba(255,255,255,0.3);}
#admin-login{display:block;} #admin-form{display:none;}
.admin-section-content{display:none;background:rgba(0,0,0,0.3);border:1px solid rgba(255,255,255,0.05);padding:15px;border-radius:12px;margin-bottom:15px;}
.admin-section-content.active{display:block;}
.list-item-admin{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;background:rgba(255,255,255,0.04);border-radius:8px;margin-bottom:6px;font-size:12px;}
.list-actions{display:flex;gap:6px;}
.sm-btn{border-radius:6px;padding:3px 10px;font-size:10px;cursor:pointer;border:1px solid transparent;background:transparent;}
.sm-edit{background:rgba(56,189,248,0.15);border-color:rgba(56,189,248,0.3);color:#38bdf8;} .sm-edit:hover{background:rgba(56,189,248,0.3);}
.sm-del{background:rgba(255,80,80,0.15);border-color:rgba(255,80,80,0.3);color:#ff8080;} .sm-del:hover{background:rgba(255,80,80,0.3);}

#popup,#activity{
  position:fixed;top:85px;left:50%;transform:translateX(-50%) translateY(-20px);
  z-index:250;background:rgba(10,10,25,0.85);border:1px solid rgba(167,139,250,0.4);
  border-radius:16px;padding:22px 28px;max-width:420px;width:88%;
  backdrop-filter:blur(16px);opacity:0;pointer-events:none;
  transition:all .4s cubic-bezier(.22,1,.36,1);text-align:center;
}
#popup.show,#activity.show{opacity:1;transform:translateX(-50%) translateY(0);pointer-events:all;}
.pop-label{font-size:10px;letter-spacing:2px;text-transform:uppercase;font-family:'Space Mono',monospace;color:#a78bfa;margin-bottom:8px;}
.pop-text{font-size:14px;color:rgba(255,255,255,0.85);line-height:1.6;}
.pop-btn{margin-top:12px;padding:7px 18px;border-radius:999px;border:1px solid rgba(167,139,250,0.4);background:rgba(167,139,250,0.1);color:#fff;font-size:12px;cursor:pointer;}

/* ═══════════════════════════════
   MOOD SELECTOR
═══════════════════════════════ */
#mood-selector{
  position:fixed;bottom:28px;left:50%;transform:translateX(-50%);z-index:200;
  display:flex;gap:10px;background:rgba(0,0,0,0.5);padding:10px 18px;
  border-radius:999px;backdrop-filter:blur(14px);border:1px solid rgba(255,255,255,0.09);
  align-items:center;
}
.mood-label{font-size:9px;letter-spacing:2px;text-transform:uppercase;font-family:'Space Mono',monospace;color:rgba(255,255,255,0.35);margin-right:4px;}
.mood-btn{padding:6px 14px;border-radius:999px;font-size:10px;font-family:'Space Mono',monospace;cursor:pointer;transition:all .3s;border:1px solid transparent;background:rgba(255,255,255,0.05);color:rgba(255,255,255,0.5);}
.mood-btn:hover{background:rgba(255,255,255,0.12);color:#fff;}
.mood-btn.active-mood{color:#fff;transform:scale(1.08);}
.mood-btn.mood-recruiter.active-mood{background:rgba(56,189,248,0.2);border-color:rgba(56,189,248,0.5);box-shadow:0 0 12px rgba(56,189,248,0.3);}
.mood-btn.mood-dev.active-mood{background:rgba(167,139,250,0.2);border-color:rgba(167,139,250,0.5);box-shadow:0 0 12px rgba(167,139,250,0.3);}
.mood-btn.mood-friend.active-mood{background:rgba(240,171,252,0.2);border-color:rgba(240,171,252,0.5);box-shadow:0 0 12px rgba(240,171,252,0.3);}

/* Mood overlay flash */
#mood-flash{position:fixed;inset:0;z-index:180;pointer-events:none;opacity:0;transition:opacity 0.4s;}

/* ═══════════════════════════════
   SOLAR SYSTEM CARD
═══════════════════════════════ */
#solar-card{
  position:fixed;left:4%;top:50%;transform:translateY(-50%) translateX(-120%) scale(0.9);
  width:90%;max-width:520px;height:500px;
  border-radius:22px;padding:2px;
  background:linear-gradient(135deg,rgba(56,189,248,0.6),rgba(167,139,250,0.6),rgba(240,171,252,0.6),rgba(56,189,248,0.6));
  background-size:300% 300%;animation:auroraAnim 6s ease infinite;
  opacity:0;transition:all .5s cubic-bezier(.22,1,.36,1);display:none;z-index:60;
}
#solar-card.show{opacity:1;transform:translateY(-50%) translateX(0) scale(1);}
#solar-inner{background:rgba(5,8,20,0.95);border-radius:20px;width:100%;height:100%;position:relative;overflow:hidden;}
#solar-canvas{width:100%;height:100%;}
#solar-tooltip{
  position:absolute;bottom:18px;left:50%;transform:translateX(-50%);
  background:rgba(0,0,0,0.7);border:1px solid rgba(167,139,250,0.4);
  border-radius:12px;padding:8px 16px;font-size:11px;font-family:'Space Mono',monospace;
  color:#fff;pointer-events:none;opacity:0;transition:opacity 0.3s;text-align:center;white-space:nowrap;
}
#solar-close{position:absolute;top:14px;right:16px;cursor:pointer;color:rgba(255,255,255,.38);font-size:18px;background:none;border:none;z-index:10;}
#solar-close:hover{color:#fff;}
#solar-title{position:absolute;top:16px;left:24px;font-size:13px;font-family:'Space Mono',monospace;color:rgba(167,139,250,0.8);letter-spacing:1px;text-transform:uppercase;}

/* ═══════════════════════════════
   SCROLL EVENTS (JOKES / FACTS)
═══════════════════════════════ */
#scroll-event{
  position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0.85);
  z-index:220;background:rgba(5,8,20,0.92);border:1px solid rgba(167,139,250,0.35);
  border-radius:20px;padding:28px 36px;max-width:400px;width:88%;
  backdrop-filter:blur(20px);opacity:0;pointer-events:none;
  transition:all .45s cubic-bezier(.22,1,.36,1);text-align:center;
}
#scroll-event.show{opacity:1;transform:translate(-50%,-50%) scale(1);pointer-events:all;}
.se-type{font-size:9px;letter-spacing:3px;text-transform:uppercase;font-family:'Space Mono',monospace;color:rgba(167,139,250,0.65);margin-bottom:10px;}
.se-emoji{font-size:36px;margin-bottom:10px;display:block;}
.se-title{font-size:17px;font-weight:700;color:#fff;margin-bottom:8px;line-height:1.3;}
.se-body{font-size:12px;color:rgba(255,255,255,0.6);line-height:1.7;margin-bottom:16px;}
.se-choices{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;}
.se-choice{padding:8px 16px;border-radius:999px;border:1px solid rgba(167,139,250,0.35);background:rgba(167,139,250,0.08);color:rgba(255,255,255,0.85);font-size:11px;font-family:'Space Mono',monospace;cursor:pointer;transition:all .25s;}
.se-choice:hover{background:rgba(167,139,250,0.22);border-color:rgba(167,139,250,0.7);}
.se-answer{font-size:12px;color:rgba(56,189,248,0.9);margin-top:10px;display:none;font-family:'Space Mono',monospace;}
.se-close{margin-top:14px;padding:7px 20px;border-radius:999px;border:1px solid rgba(255,255,255,0.1);background:transparent;color:rgba(255,255,255,0.35);font-size:11px;cursor:pointer;transition:all .25s;}
.se-close:hover{color:#fff;border-color:rgba(255,255,255,0.4);}
</style>
</head>
<body>

<div id="video-wrap"><video id="vid" src="space.mp4" muted playsinline loop preload="auto"></video></div>
<div id="vignette"></div>
<canvas id="sc"></canvas>
<canvas id="fx"></canvas>

<div id="top-nav"></div>
<div id="labels"></div>
<div id="cosmic-quotes">Scroll to travel...</div>

<div id="overlay" onclick="bgClose(event)">
  <div class="card" id="card-intro"><div class="card-inner" id="content-intro"></div></div>
  <div class="card" id="card-skills"><div class="card-inner" id="content-skills"></div></div>
  <div class="card" id="card-proj1"><div class="card-inner" id="content-proj1"></div></div>
  <div class="card" id="card-proj2"><div class="card-inner" id="content-proj2"></div></div>
  <div class="card" id="card-contact"><div class="card-inner" id="content-contact"></div></div>
  <div id="custom-cards-container"></div>
</div>

<!-- SOLAR SYSTEM CARD (separate, on left side) -->
<div id="solar-card">
  <div id="solar-inner">
    <button id="solar-close" onclick="closeSolar()">✕</button>
    <div id="solar-title">☀ Skills Universe</div>
    <canvas id="solar-canvas"></canvas>
    <div id="solar-tooltip"></div>
  </div>
</div>

<!-- MOOD SELECTOR -->
<div id="mood-selector">
  <span class="mood-label">I am a</span>
  <button class="mood-btn mood-recruiter active-mood" onclick="setMood('recruiter')"> Recruiter</button>
  <button class="mood-btn mood-dev" onclick="setMood('dev')"> Developer</button>
  <button class="mood-btn mood-friend" onclick="setMood('friend')"> Friend</button>
</div>
<div id="mood-flash"></div>

<!-- SCROLL EVENT POPUP (Jokes / Space Questions) -->
<div id="scroll-event">
  <div class="se-type" id="se-type"></div>
  <span class="se-emoji" id="se-emoji"></span>
  <div class="se-title" id="se-title"></div>
  <div class="se-body" id="se-body"></div>
  <div class="se-choices" id="se-choices"></div>
  <div class="se-answer" id="se-answer"></div>
  <button class="se-close" onclick="closeScrollEvent()">Continue Journey →</button>
</div>

<button id="admin-btn" onclick="openAdmin()">⚙ Admin CMS</button>

<div id="popup"><div class="pop-label" id="pop-label"></div><div class="pop-text" id="pop-text"></div><button class="pop-btn" onclick="closePopup()">Got it! 👍</button></div>

<div id="admin-panel">
  <div class="admin-box">
    <div id="admin-login">
      <h3>Admin Access</h3>
      <p>Enter password to manage portfolio content</p>
      <input class="admin-input" type="password" id="admin-pass" placeholder="Password..." onkeydown="if(event.key==='Enter')checkPass()"/>
      <button class="admin-save" onclick="checkPass()">Unlock 🔐</button>
      <button class="admin-close" onclick="closeAdmin()">Cancel</button>
      <div id="pass-err" style="color:#ff8080;font-size:12px;margin-top:8px;text-align:center;"></div>
    </div>
    <div id="admin-form">
      <h3>CMS Dashboard</h3>
      <select id="admin-section-select" class="admin-input" onchange="switchAdminTab()">
        <option value="intro">📝 Card 1: About Me</option>
        <option value="skills">⚡ Card 2: Tech Stack</option>
        <option value="projects">🚀 Card 3: Projects</option>
        <option value="ai">🧠 Card 4: AI Projects</option>
        <option value="contact">📡 Card 5: Contact Info</option>
        <option value="customcards" style="background:rgba(56,189,248,0.2)">➕ Create Custom Card</option>
      </select>
      <div id="form-intro" class="admin-section-content active">
        <input class="admin-input" id="in-name" placeholder="Name"/>
        <input class="admin-input" id="in-role" placeholder="Role"/>
        <textarea class="admin-input" id="in-bio" placeholder="Bio..."></textarea>
        <input class="admin-input" id="in-loc" placeholder="Location"/>
        <input class="admin-input" id="in-cgpa" placeholder="CGPA"/>
        <button class="admin-save" onclick="saveIntro()">Save About Info 💾</button>

var seShownIndices=[];
var seLastTime=-999;
var seCooldown=false;
var SE_MIN_GAP=35;

function maybeShowScrollEvent(currentTime){
  if(seCooldown) return;
  if(Math.abs(currentTime-seLastTime)<SE_MIN_GAP) return;
  if(document.getElementById('scroll-event').classList.contains('show')) return;
  if(document.getElementById('overlay').classList.contains('open')) return;
  // 18% chance per check zone
  if(Math.random()>0.18) return;
  // Pick unseen event
  var available=SCROLL_EVENTS.map((_,i)=>i).filter(i=>!seShownIndices.includes(i));
  if(available.length===0){seShownIndices=[];available=SCROLL_EVENTS.map((_,i)=>i);}
  var pick=available[Math.floor(Math.random()*available.length)];
  seShownIndices.push(pick);
  showScrollEvent(SCROLL_EVENTS[pick]);
  seLastTime=currentTime;
  seCooldown=true;
  setTimeout(()=>seCooldown=false,SE_MIN_GAP*1000*0.5);
}

function showScrollEvent(ev){
  document.getElementById('se-type').textContent=ev.type;
  document.getElementById('se-emoji').textContent=ev.emoji;
  document.getElementById('se-title').textContent=ev.title;
  document.getElementById('se-body').textContent=ev.body;
  document.getElementById('se-answer').style.display='none';
  document.getElementById('se-answer').textContent='';
  var choicesEl=document.getElementById('se-choices');
  choicesEl.innerHTML='';
  if(ev.kind==='quiz'&&ev.choices){
    ev.choices.forEach((c,i)=>{
      var btn=document.createElement('button');
      btn.className='se-choice';
      btn.textContent=c;

        document.querySelectorAll('.se-choice').forEach(b=>b.style.opacity='0.4');
        btn.style.opacity='1';
        btn.style.borderColor=i===ev.answer?'rgba(56,189,248,0.8)':'rgba(255,80,80,0.6)';
        btn.style.background=i===ev.answer?'rgba(56,189,248,0.15)':'rgba(255,80,80,0.1)';

        ansEl.style.display='block';
      };
      choicesEl.appendChild(btn);
    });
  }
  document.getElementById('scroll-event').classList.add('show');
  // Pause video while event is showing

}

// SOLAR SYSTEM
// ═══════════════════════════════════════════
var solarCanvas=document.getElementById('solar-canvas');
var solarCtx=solarCanvas.getContext('2d');
var solarRAF=null;
var solarRunning=false;

var PLANET_COLORS=[
  '#a78bfa','#38bdf8','#f0abfc','#34d399','#fbbf24','#f87171','#60a5fa','#e879f9'
];

function buildPlanets(){
  var planets=[];
  var allTags=[];
  pData.skills.forEach(s=>{
    s.tags.split(',').forEach(t=>{
      var tag=t.trim();
      if(tag) allTags.push({tag,cat:s.cat});
    });
  });
  allTags.forEach((t,i)=>{
    var angle=Math.random()*Math.PI*2;
    var orbit=90+i*38+(Math.random()*18-9);
    var size=6+Math.random()*5;
    var speed=(0.003+Math.random()*0.004)*(Math.random()<0.5?1:-1);
    var color=PLANET_COLORS[i%PLANET_COLORS.length];
    planets.push({tag:t.tag,cat:t.cat,angle,orbit,size,speed,color,x:0,y:0,glowPhase:Math.random()*Math.PI*2});
  });
  return planets;
}

var planets=[];
function openSolar(){
  planets=buildPlanets();
  document.getElementById('solar-card').style.display='block';
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    document.getElementById('solar-card').classList.add('show');
    solarCanvas.width=solarCanvas.offsetWidth;
    solarCanvas.height=solarCanvas.offsetHeight;
    if(!solarRunning){solarRunning=true;drawSolar();}
  }));
}
function closeSolar(){
  document.getElementById('solar-card').classList.remove('show');
  setTimeout(()=>{document.getElementById('solar-card').style.display='none';},500);
  solarRunning=false;
  if(solarRAF) cancelAnimationFrame(solarRAF);
}

var hoveredPlanet=null;
solarCanvas.addEventListener('mousemove',function(e){
  var rect=solarCanvas.getBoundingClientRect();
  var mx=e.clientX-rect.left,my=e.clientY-rect.top;
  hoveredPlanet=null;
  planets.forEach(p=>{
    var dx=p.x-mx,dy=p.y-my;
    if(Math.sqrt(dx*dx+dy*dy)<p.size+6) hoveredPlanet=p;
  });
  var tip=document.getElementById('solar-tooltip');
  if(hoveredPlanet){
    tip.textContent=hoveredPlanet.tag+' · '+hoveredPlanet.cat;
    tip.style.opacity='1';
  } else {
    tip.style.opacity='0';
  }
});

function drawSolar(){
  if(!solarRunning) return;
  var w=solarCanvas.width,h=solarCanvas.height;
  var cx=w/2,cy=h/2;
  solarCtx.clearRect(0,0,w,h);

  // Background stars
  solarCtx.fillStyle='rgba(167,139,250,0.15)';
  for(var i=0;i<60;i++){
    var sx=((i*173+37)%w),sy=((i*97+11)%h);
    solarCtx.beginPath();
    solarCtx.arc(sx,sy,0.8,0,Math.PI*2);
    solarCtx.fill();
  }

  // Draw orbit rings
  planets.forEach(p=>{
    solarCtx.beginPath();
    solarCtx.arc(cx,cy,p.orbit,0,Math.PI*2);
    solarCtx.strokeStyle='rgba(255,255,255,0.04)';
    solarCtx.lineWidth=1;
    solarCtx.stroke();
    p.angle+=p.speed;
  });

  // Draw SUN (SubbaReddy's name)
  var sunGlow=0.7+Math.sin(Date.now()*0.002)*0.3;
  solarCtx.save();
  solarCtx.shadowColor='rgba(255,200,80,0.8)';
  solarCtx.shadowBlur=30*sunGlow;
  solarCtx.beginPath();
  solarCtx.arc(cx,cy,22,0,Math.PI*2);
  var sunGrad=solarCtx.createRadialGradient(cx,cy,0,cx,cy,22);
  sunGrad.addColorStop(0,'#fff7aa');
  sunGrad.addColorStop(0.5,'#fbbf24');
  sunGrad.addColorStop(1,'#f59e0b');
  solarCtx.fillStyle=sunGrad;
  solarCtx.fill();
  solarCtx.restore();
  solarCtx.fillStyle='rgba(5,8,20,0.9)';
  solarCtx.font='bold 8px Space Mono, monospace';
  solarCtx.textAlign='center';
  solarCtx.textBaseline='middle';
  solarCtx.fillText('SR',cx,cy);

  // Draw planets
  planets.forEach(p=>{
    p.x=cx+Math.cos(p.angle)*p.orbit;
    p.y=cy+Math.sin(p.angle)*p.orbit;
    p.glowPhase+=0.03;
    var glow=0.6+Math.sin(p.glowPhase)*0.4;
    var isHov=hoveredPlanet===p;
    solarCtx.save();
    solarCtx.shadowColor=p.color;
    solarCtx.shadowBlur=isHov?24:10*glow;
    solarCtx.beginPath();
    solarCtx.arc(p.x,p.y,isHov?p.size+3:p.size,0,Math.PI*2);
    solarCtx.fillStyle=p.color;
    solarCtx.globalAlpha=0.85+glow*0.15;
    solarCtx.fill();
    solarCtx.restore();
    // Label on hover
    if(isHov){
      solarCtx.fillStyle='#fff';
      solarCtx.font='bold 10px Space Grotesk, sans-serif';
      solarCtx.textAlign='center';
      solarCtx.fillText(p.tag,p.x,p.y-p.size-8);
    }
  });

  solarRAF=requestAnimationFrame(drawSolar);
}

// ═══════════════════════════════════════════
// ADMIN LOGIC
// ═══════════════════════════════════════════
var editIndex=-1;
function openAdmin(){document.getElementById('admin-panel').classList.add('open');document.getElementById('admin-login').style.display='block';document.getElementById('admin-form').style.display='none';document.getElementById('admin-pass').value='';document.getElementById('pass-err').textContent='';closeAll(false);}
function closeAdmin(){document.getElementById('admin-panel').classList.remove('open');}
function checkPass(){if(document.getElementById('admin-pass').value===ADMIN_PASS){document.getElementById('admin-login').style.display='none';document.getElementById('admin-form').style.display='block';switchAdminTab();}else{document.getElementById('pass-err').textContent='Wrong password!';}}
function switchAdminTab(){
  document.querySelectorAll('.admin-section-content').forEach(el=>el.classList.remove('active'));
  let tab=document.getElementById('admin-section-select').value;
  document.getElementById('form-'+tab).classList.add('active');
  editIndex=-1;
  if(tab==='intro'){document.getElementById('in-name').value=pData.intro.name;document.getElementById('in-role').value=pData.intro.role;document.getElementById('in-bio').value=pData.intro.bio;document.getElementById('in-loc').value=pData.intro.loc;document.getElementById('in-cgpa').value=pData.intro.cgpa;}
  else if(tab==='contact'){document.getElementById('in-c-bio').value=pData.contact.bio;document.getElementById('in-c-email').value=pData.contact.email;document.getElementById('in-c-link').value=pData.contact.link;}
  else if(tab==='skills'){renderAdminList('skills','admin-list-skills');document.getElementById('in-skill-cat').value='';document.getElementById('in-skill-tags').value='';}
  else if(tab==='projects'){renderAdminList('projects','admin-list-projects');clearProjForm('p1');}
  else if(tab==='ai'){renderAdminList('ai','admin-list-ai');clearProjForm('p2');}
  else if(tab==='customcards'){renderAdminList('customCards','admin-list-custom');document.getElementById('in-cc-nav').value='';document.getElementById('in-cc-title').value='';document.getElementById('in-cc-sub').value='';document.getElementById('in-cc-desc').value='';}
}
function renderAdminList(type,containerId){var list=document.getElementById(containerId);list.innerHTML='';pData[type].forEach((item,i)=>{let title=type==='skills'?item.cat:type==='customCards'?item.title:(item.emoji+' '+item.name);list.innerHTML+=`<div class="list-item-admin"><span style="max-width:65%;overflow:hidden;white-space:nowrap;">${title}</span><div class="list-actions"><button class="sm-btn sm-edit" onclick="prepEdit('${type}',${i})">Edit</button><button class="sm-btn sm-del" onclick="delItem('${type}',${i})">Del</button></div></div>`;});}
function saveIntro(){pData.intro={name:document.getElementById('in-name').value,role:document.getElementById('in-role').value,bio:document.getElementById('in-bio').value,loc:document.getElementById('in-loc').value,cgpa:document.getElementById('in-cgpa').value};saveData();alert("Saved!");}
function saveContact(){pData.contact={bio:document.getElementById('in-c-bio').value,email:document.getElementById('in-c-email').value,link:document.getElementById('in-c-link').value};saveData();alert("Saved!");}
function prepEdit(type,i){editIndex=i;let item=pData[type][i];if(type==='skills'){document.getElementById('in-skill-cat').value=item.cat;document.getElementById('in-skill-tags').value=item.tags;}else if(type==='projects'){document.getElementById('in-p1-name').value=item.name;document.getElementById('in-p1-badge').value=item.badge;document.getElementById('in-p1-emoji').value=item.emoji;document.getElementById('in-p1-desc').value=item.desc;document.getElementById('in-p1-link').value=item.link;}else if(type==='ai'){document.getElementById('in-p2-name').value=item.name;document.getElementById('in-p2-badge').value=item.badge;document.getElementById('in-p2-emoji').value=item.emoji;document.getElementById('in-p2-desc').value=item.desc;document.getElementById('in-p2-link').value=item.link;}else if(type==='customCards'){document.getElementById('in-cc-nav').value=item.navName;document.getElementById('in-cc-title').value=item.title;document.getElementById('in-cc-sub').value=item.sub;document.getElementById('in-cc-desc').value=item.desc;}}
function addSkill(){let obj={cat:document.getElementById('in-skill-cat').value,tags:document.getElementById('in-skill-tags').value};if(!obj.cat) return;if(editIndex>-1) pData.skills[editIndex]=obj;else pData.skills.push(obj);editIndex=-1;saveData();switchAdminTab();}
function addProject(type){let pfix=type==='projects'?'p1':'p2';let obj={name:document.getElementById('in-'+pfix+'-name').value,badge:document.getElementById('in-'+pfix+'-badge').value,emoji:document.getElementById('in-'+pfix+'-emoji').value,desc:document.getElementById('in-'+pfix+'-desc').value,link:document.getElementById('in-'+pfix+'-link').value};if(!obj.name) return;if(editIndex>-1) pData[type][editIndex]=obj;else pData[type].push(obj);editIndex=-1;saveData();switchAdminTab();}
function addCustomCard(){let obj={navName:document.getElementById('in-cc-nav').value||'New',title:document.getElementById('in-cc-title').value,sub:document.getElementById('in-cc-sub').value,desc:document.getElementById('in-cc-desc').value};if(!obj.title) return;if(editIndex>-1) pData.customCards[editIndex]=obj;else pData.customCards.push(obj);editIndex=-1;saveData();switchAdminTab();alert("Space card added!");}
function delItem(type,i){if(confirm("Delete this?")) {pData[type].splice(i,1);saveData();switchAdminTab();}}
function clearProjForm(pfix){['name','badge','emoji','desc','link'].forEach(f=>document.getElementById('in-'+pfix+'-'+f).value='');}

// ═══════════════════════════════════════════
// JOKES & POPUP
// ═══════════════════════════════════════════
var JOKES=[
  {label:'😂 Dev Joke',text:'Why do programmers prefer dark mode? Because light attracts bugs! 🐛'},
  {label:'👨‍💻 Dev Life',text:'I write code that works on my machine. Therefore, we ship my machine to the client. 📦'},
  {label:'🧠 AI Fact',text:'Machine Learning is like teenagers. You teach it stuff, but it just does whatever it wants anyway. 🤖'},
  {label:'🚀 SubbaReddy Fact',text:"SubbaReddy's code compiles faster than a spaceship hitting warp speed. 🌌"}
];
function showJoke(){var j=JOKES[Math.floor(Math.random()*JOKES.length)];document.getElementById('pop-label').textContent=j.label;document.getElementById('pop-text').textContent=j.text;document.getElementById('popup').classList.add('show');setTimeout(closePopup,6000);}
function closePopup(){document.getElementById('popup').classList.remove('show');}

// ═══════════════════════════════════════════
// COSMIC QUOTES — mood-aware
// ═══════════════════════════════════════════
var MOOD_QUOTES=MOOD_CONFIG.recruiter.quoteSet;
var BASE_QUOTES=["Scroll to travel the cosmos...","Go up and see the world with intensive eyes 👀","My hunger to learn expands faster than the Milky Way 🌌","Gravity holds planets, but nothing holds my curiosity 🚀","Debugging the universe... one line of code at a time 🛠️","404: Limits not found. Let's build the future."];
var quoteEl=document.getElementById('cosmic-quotes');

// ═══════════════════════════════════════════
// VIDEO SCROLL
// ═══════════════════════════════════════════
var vid=document.getElementById("vid"),scrollVel=0,isScrolling=false,scrollTimer=null,hintShown=true;
window.addEventListener("wheel",e=>{e.preventDefault();scrollVel=e.deltaY*0.014;isScrolling=true;clearTimeout(scrollTimer);scrollTimer=setTimeout(()=>isScrolling=false,90);if(hintShown){document.getElementById("hint").style.opacity="0";hintShown=false;}},{passive:false});
var touchY=0;
window.addEventListener("touchstart",e=>{touchY=e.touches[0].clientY;},{passive:true});
window.addEventListener("touchmove",e=>{scrollVel=(touchY-e.touches[0].clientY)*0.05;isScrolling=true;clearTimeout(scrollTimer);scrollTimer=setTimeout(()=>isScrolling=false,90);touchY=e.touches[0].clientY;if(hintShown){document.getElementById("hint").style.opacity="0";hintShown=false;}},{passive:true});
window.addEventListener("touchend",()=>{isScrolling=false;scrollVel=0;},{passive:true});

function jumpTo(t){vid.currentTime=t;}

var lastQuoteZone=-1;
function videoLoop(){
  if(isScrolling&&Math.abs(scrollVel)>0.01){
    let r=Math.max(-3,Math.min(3,scrollVel));
    if(r>=0){if(vid.paused) vid.play();vid.playbackRate=Math.max(0.1,r);}
    else{vid.pause();vid.currentTime=Math.max(0,vid.currentTime+r*0.05);}
  } else {
    if(!vid.paused) vid.pause();
  }
  if(vid.currentTime>=233.5) vid.currentTime=0;

  // Nav + Labels
  var dots=document.querySelectorAll(".nav-dot");
  window.labelData.forEach((d,i)=>{
    var el=document.getElementById(d.id);
    if(el){var near=Math.abs(vid.currentTime-d.time)<12;el.classList.toggle("visible",near);if(dots[i]) dots[i].classList.toggle("active",near);}
  });

  // Cosmic Quotes (mood-aware)
  var allQuotes=[...BASE_QUOTES,...MOOD_QUOTES];
  var pct=vid.currentTime/233.0;
  var qIndex=Math.floor(pct*allQuotes.length)%allQuotes.length;
  if(qIndex!==lastQuoteZone&&allQuotes[qIndex]){
    lastQuoteZone=qIndex;
    quoteEl.style.opacity=0;
    setTimeout(()=>{quoteEl.textContent=allQuotes[qIndex];quoteEl.style.opacity=1;},400);
  }

  // Scroll events (jokes / space questions)
  maybeShowScrollEvent(vid.currentTime);

  requestAnimationFrame(videoLoop);
}
vid.pause();vid.currentTime=0;videoLoop();

// ═══════════════════════════════════════════
// CANVAS FX
// ═══════════════════════════════════════════
var sc=document.getElementById("sc"),sctx=sc.getContext("2d"),stars=[];
function initStars(){sc.width=innerWidth;sc.height=innerHeight;stars=[];for(var i=0;i<130;i++) stars.push({x:Math.random()*sc.width,y:Math.random()*sc.height,r:Math.random()*1.2+.15,o:Math.random()*.45+.08,s:Math.random()*.007+.002,dir:Math.random()<.5?1:-1});}
function drawStars(){sctx.clearRect(0,0,sc.width,sc.height);stars.forEach(s=>{s.o+=s.s*s.dir;if(s.o>.62||s.o<.05)s.dir*=-1;sctx.beginPath();sctx.arc(s.x,s.y,s.r,0,Math.PI*2);sctx.fillStyle="rgba(167,139,250,"+s.o.toFixed(2)+")";sctx.fill();});requestAnimationFrame(drawStars);}
initStars();drawStars();window.addEventListener("resize",initStars);

var fx=document.getElementById("fx"),fctx=fx.getContext("2d");
function resizeFX(){fx.width=innerWidth;fx.height=innerHeight;}resizeFX();window.addEventListener("resize",resizeFX);
var particles=[];var fxRAF=null;var fxRunning=false;
function fxLoop(){fctx.clearRect(0,0,fx.width,fx.height);var alive=false;particles.forEach(p=>{if(p.life<=0) return;alive=true;p.x+=p.vx;p.y+=p.vy;p.vy+=p.gravity;p.vx*=0.98;p.life-=p.decay;var a=Math.max(0,p.life);fctx.save();fctx.globalAlpha=Math.min(1,a*1.5);fctx.font="bold "+p.fs+"px 'Space Grotesk',sans-serif";fctx.fillStyle="#fff";fctx.textAlign="center";fctx.textBaseline="middle";fctx.shadowColor="rgba("+p.col+",0.9)";fctx.shadowBlur=8;fctx.fillText(p.ch,p.x,p.y);fctx.restore();});particles=particles.filter(p=>p.life>0);if(alive) fxRAF=requestAnimationFrame(fxLoop);else{fctx.clearRect(0,0,fx.width,fx.height);fxRunning=false;}}
function explodeCard(card){var chars=card.querySelectorAll(".char");chars.forEach(c=>{var r=c.getBoundingClientRect();if(r.width===0) return;var a=Math.random()*Math.PI*2,s=3+Math.random()*9,cl=["167,139,250","200,180,255","255,255,255"][Math.floor(Math.random()*3)];particles.push({x:r.left+r.width/2,y:r.top+r.height/2,vx:Math.cos(a)*s+(Math.random()-.5)*2,vy:Math.sin(a)*s+(Math.random()-.5)*2,gravity:0.18+Math.random()*0.12,size:2,life:1.0,decay:0.012+Math.random()*0.016,ch:c.textContent,fs:parseFloat(window.getComputedStyle(c).fontSize)||14,col:cl});});if(!fxRunning){fxRunning=true;if(fxRAF) cancelAnimationFrame(fxRAF);fxLoop();}}
var wrappedCards={};
function wrapText(el){var nodes=[];function collect(node){if(node.nodeType===3){if(node.parentNode&&node.parentNode.classList&&node.parentNode.classList.contains("char")) return;nodes.push(node);}else if(node.nodeType===1){if(node.tagName==="BUTTON"||node.tagName==="A") return;Array.from(node.childNodes).forEach(collect);}}collect(el);nodes.forEach(node=>{var f=document.createDocumentFragment();for(var i=0;i<node.nodeValue.length;i++){var ch=node.nodeValue[i];if(ch===" "||ch==="\n") f.appendChild(document.createTextNode(ch));else{var sp=document.createElement("span");sp.className="char";sp.textContent=ch;f.appendChild(sp);}}node.parentNode.replaceChild(f,node);});}
function rainIn(card){var chars=Array.from(card.querySelectorAll(".char"));chars.forEach(c=>c.classList.remove("down"));card.offsetHeight;chars.forEach((c,i)=>setTimeout(()=>c.classList.add("down"),i*20));}

var overlay=document.getElementById("overlay"),activeCard=null;
function openCard(id){closeAll(false);var card=document.getElementById("card-"+id);if(!card) return;if(!wrappedCards[id]){wrapText(card);wrappedCards[id]=true;}overlay.classList.add("open");card.style.display="block";activeCard=card;if(Math.random()>0.7&&!document.getElementById('popup').classList.contains('show')){setTimeout(showJoke,1000);}requestAnimationFrame(()=>requestAnimationFrame(()=>{card.classList.add("show");setTimeout(()=>rainIn(card),80);}));}
function bgClose(e){if(e.target===overlay) closeAll(true);}
function closeAll(doExplode){if(doExplode===undefined) doExplode=true;overlay.classList.remove("open");window.allCards.forEach(c=>{if(c.classList.contains("show")&&doExplode){c.classList.add("exploding");explodeCard(c);}c.classList.remove("show");setTimeout(()=>{if(!c.classList.contains("show")){c.style.display="none";c.classList.remove("exploding");}},250);});activeCard=null;}
document.addEventListener("keydown",e=>{if(e.key==="Escape") closeAll(true);});
</script>
